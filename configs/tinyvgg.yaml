data:
  dataset: radioml2018
  path: C:/Users/Wjunxion/Documents/datasets/radioml2018/GOLD_XYZ_OSC.0001_1024.hdf5
  data_ratio: 0.01
  train_ratio: 0.8
  stratified: true
  eps: 1.0e-6

model:
  n_classes: 24

training:
  batch_size: 16
  shuffle_buffer: 512
  epochs: 10
  lr: 0.001
  seed: 42
  augment_train: true
  awgn_std: 0.05
  rotation_count: 4

results:
  dir: model_history/tinyvgg
  log: training_history.csv
  model: tinyvgg.keras
  class_counts: class_counts.csv
  snr_counts: snr_counts.csv
  metrics: mlpipeline-metrics.json
  snr_predictions: snr_predictions.csv
  snr_plot: snr_accuracy.png
